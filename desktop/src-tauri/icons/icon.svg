<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a12"/>
      <stop offset="1" stop-color="#1a1726"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="80" x2="372" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="body" x1="200" y1="140" x2="312" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#bg)"/>
  <rect x="56" y="56" width="400" height="400" rx="80" stroke="url(#accent)" stroke-width="10" opacity="0.35"/>

  <!-- USB-A metal connector — drawn FIRST so body overlaps its base -->
  <rect x="214" y="92" width="84" height="100" rx="2" fill="#b0abb8"/>
  <!-- Two holes on connector face -->
  <rect x="226" y="124" width="22" height="14" rx="2" fill="#7c28c9"/>
  <rect x="264" y="124" width="22" height="14" rx="2" fill="#7c28c9"/>

  <!-- USB stick body — drawn AFTER connector, overlaps its bottom -->
  <rect x="196" y="170" width="120" height="230" rx="12" fill="url(#body)"/>

  <!-- LED indicator dot -->
  <circle cx="256" cy="192" r="6" fill="#c026d3" opacity="0.9"/>
  <circle cx="256" cy="192" r="3" fill="#e879f9"/>

  <!-- Waveform bars on USB body -->
  <rect x="218" y="240" width="6"  height="28" rx="3" fill="#e4dff0" opacity="0.55"/>
  <rect x="230" y="230" width="6"  height="48" rx="3" fill="#e4dff0" opacity="0.65"/>
  <rect x="242" y="220" width="6"  height="68" rx="3" fill="#e4dff0" opacity="0.75"/>
  <rect x="254" y="212" width="6"  height="84" rx="3" fill="#e4dff0" opacity="0.85"/>
  <rect x="266" y="224" width="6"  height="60" rx="3" fill="#e4dff0" opacity="0.7"/>
  <rect x="278" y="234" width="6"  height="40" rx="3" fill="#e4dff0" opacity="0.6"/>
  <rect x="290" y="244" width="6"  height="20" rx="3" fill="#e4dff0" opacity="0.5"/>

  <!-- Second waveform row — subtle echo -->
  <rect x="218" y="326" width="6"  height="16" rx="3" fill="#e4dff0" opacity="0.25"/>
  <rect x="230" y="320" width="6"  height="28" rx="3" fill="#e4dff0" opacity="0.3"/>
  <rect x="242" y="314" width="6"  height="40" rx="3" fill="#e4dff0" opacity="0.35"/>
  <rect x="254" y="310" width="6"  height="48" rx="3" fill="#e4dff0" opacity="0.4"/>
  <rect x="266" y="316" width="6"  height="36" rx="3" fill="#e4dff0" opacity="0.3"/>
  <rect x="278" y="322" width="6"  height="24" rx="3" fill="#e4dff0" opacity="0.25"/>
  <rect x="290" y="328" width="6"  height="12" rx="3" fill="#e4dff0" opacity="0.2"/>
</svg>
